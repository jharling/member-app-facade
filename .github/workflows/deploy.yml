name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Test
        run: ./gradlew test --no-daemon

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            infra/package-lock.json
            security/package-lock.json

      - name: Install infrastructure dependencies
        working-directory: infra
        run: npm ci

      - name: Install security test dependencies
        working-directory: security
        run: npm ci

      - name: Build security test tools
        working-directory: security
        run: npm run build

      - name: Deploy with Pulumi
        uses: pulumi/actions@v6
        with:
          command: up
          stack-name: ${{ vars.PULUMI_STACK || 'dev' }}
          work-dir: infra
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

      - name: Run security smoke test
        run: |
          TARGET_URL="$(pulumi stack output serviceBaseUrl --cwd infra)"
          TARGET_HOST="$(node -e "console.log(new URL(process.argv[1]).hostname)" "$TARGET_URL")"
          npm --prefix security run scan -- \
            --target-url "$TARGET_URL" \
            --allow-host "$TARGET_HOST" \
            --fail-on high \
            --readiness-retries 36 \
            --readiness-delay-ms 5000
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
